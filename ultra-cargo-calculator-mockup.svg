<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8f9fa"/>
      <stop offset="1" stop-color="#e9ecef"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.62"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#2563eb" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
    <style>
      .h{font:800 42px 'Arial',sans-serif; fill:#111827; letter-spacing:-1.8px}
      .p{font:500 18px 'Arial',sans-serif; fill:#64748b}
      .t{font:800 19px 'Arial',sans-serif; fill:#111827}
      .s{font:700 14px 'Arial',sans-serif; fill:#64748b}
      .w{font:800 16px 'Arial',sans-serif; fill:#fff}
      .smallw{font:700 12px 'Arial',sans-serif; fill:#fff}
      .muted{font:700 13px 'Arial',sans-serif; fill:#475569}
      .price{font:900 56px 'Arial',sans-serif; fill:#111827; letter-spacing:-2px}
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="230" cy="115" r="210" fill="#2563eb" opacity="0.13" filter="url(#soft)"/>
  <circle cx="1340" cy="150" r="230" fill="#10b981" opacity="0.12" filter="url(#soft)"/>
  <rect width="1600" height="1000" fill="url(#grid)" opacity="0.5"/>

  <text x="800" y="70" text-anchor="middle" class="h">3D калькулятор грузоперевозок</text>
  <text x="800" y="106" text-anchor="middle" class="p">Левая панель — параметры перевозки · Правая панель — 3D кузов, паллеты и план загрузки · Снизу — стоимость</text>

  <g filter="url(#shadow)" transform="translate(60 135) rotate(-1.1 740 380)">
    <rect x="0" y="0" width="1480" height="800" rx="36" fill="url(#glass)" stroke="#fff" stroke-opacity="0.9"/>

    <!-- LEFT PANEL -->
    <rect x="28" y="28" width="555" height="610" rx="28" fill="#ffffff" fill-opacity="0.78" stroke="#cbd5e1" stroke-opacity="0.55"/>
    <text x="56" y="70" class="t">Параметры перевозки</text>

    <text x="58" y="112" class="s">01 · Тип переезда</text>
    <rect x="58" y="130" width="116" height="70" rx="18" fill="url(#blue)"/>
    <text x="116" y="158" text-anchor="middle" class="w">🏠</text>
    <text x="116" y="181" text-anchor="middle" class="smallw">Квартирный</text>
    <rect x="186" y="130" width="116" height="70" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="244" y="158" text-anchor="middle" class="muted">🏢</text>
    <text x="244" y="181" text-anchor="middle" class="muted">Офисный</text>
    <rect x="314" y="130" width="116" height="70" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="372" y="158" text-anchor="middle" class="muted">📦</text>
    <text x="372" y="181" text-anchor="middle" class="muted">Коммерч.</text>
    <rect x="442" y="130" width="100" height="70" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="492" y="158" text-anchor="middle" class="muted">🏭</text>
    <text x="492" y="181" text-anchor="middle" class="muted">Пром.</text>

    <text x="58" y="234" class="s">02 · Маршрут</text>
    <rect x="58" y="252" width="220" height="52" rx="14" fill="#f8f9fa" stroke="#cbd5e1"/>
    <text x="78" y="285" class="muted">📍 Краснодар</text>
    <rect x="290" y="252" width="52" height="52" rx="14" fill="#dbeafe"/>
    <text x="316" y="286" text-anchor="middle" class="t">⇄</text>
    <rect x="354" y="252" width="188" height="52" rx="14" fill="#f8f9fa" stroke="#cbd5e1"/>
    <text x="374" y="285" class="muted">📍 Сочи</text>
    <rect x="58" y="316" width="484" height="42" rx="13" fill="#f8f9fa" stroke="#cbd5e1"/>
    <text x="78" y="343" class="muted">Расстояние: 286 км</text>

    <text x="58" y="392" class="s">03 · Груз</text>
    <rect x="58" y="410" width="150" height="48" rx="14" fill="#f8f9fa" stroke="#cbd5e1"/>
    <text x="76" y="440" class="muted">⚖️ 420 кг</text>
    <rect x="220" y="410" width="150" height="48" rx="14" fill="#f8f9fa" stroke="#cbd5e1"/>
    <text x="238" y="440" class="muted">◼ 7.5 м³</text>
    <rect x="382" y="410" width="160" height="48" rx="14" fill="#f8f9fa" stroke="#cbd5e1"/>
    <text x="400" y="440" class="muted">Хрупкий груз</text>
    <rect x="58" y="472" width="104" height="34" rx="17" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="110" y="494" text-anchor="middle" font-family="Arial" font-weight="800" font-size="13" fill="#92400e">Хрупкое</text>
    <rect x="174" y="472" width="122" height="34" rx="17" fill="#e0f2fe" stroke="#06b6d4"/>
    <text x="235" y="494" text-anchor="middle" font-family="Arial" font-weight="800" font-size="13" fill="#0369a1">Температура</text>
    <rect x="308" y="472" width="105" height="34" rx="17" fill="#dcfce7" stroke="#10b981"/>
    <text x="360" y="494" text-anchor="middle" font-family="Arial" font-weight="800" font-size="13" fill="#047857">Верх ↑</text>

    <text x="58" y="542" class="s">04 · Поддоны</text>
    <rect x="58" y="560" width="150" height="44" rx="14" fill="url(#blue)"/>
    <text x="133" y="588" text-anchor="middle" class="w">+ Поддон</text>
    <rect x="220" y="560" width="150" height="44" rx="14" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="295" y="588" text-anchor="middle" class="muted">Автозаполнить</text>
    <rect x="382" y="560" width="160" height="44" rx="14" fill="#f8f9fa" stroke="#cbd5e1"/>
    <text x="462" y="588" text-anchor="middle" class="muted">EUR 120×80</text>

    <!-- RIGHT PANEL -->
    <rect x="610" y="28" width="842" height="610" rx="28" fill="#ffffff" fill-opacity="0.72" stroke="#cbd5e1" stroke-opacity="0.55"/>
    <text x="642" y="70" class="t">Интерактивная 3D сцена</text>
    <text x="642" y="96" class="s">Разрез кузова · изометрия · рентген · план загрузки</text>
    <rect x="1220" y="54" width="92" height="34" rx="17" fill="#111827"/>
    <text x="1266" y="76" text-anchor="middle" class="smallw">Изометрия</text>
    <rect x="1322" y="54" width="74" height="34" rx="17" fill="#fff" stroke="#cbd5e1"/>
    <text x="1359" y="76" text-anchor="middle" class="muted">Сверху</text>

    <rect x="642" y="122" width="778" height="330" rx="30" fill="url(#bg)" stroke="#e2e8f0"/>
    <ellipse cx="1020" cy="420" rx="320" ry="48" fill="#0f172a" opacity="0.18" filter="url(#soft)"/>

    <!-- Truck isometric -->
    <g transform="translate(710 205) skewX(-10)">
      <rect x="0" y="88" width="165" height="150" rx="32" fill="url(#blue)"/>
      <rect x="102" y="112" width="48" height="50" rx="10" fill="#dbeafe" opacity="0.86"/>
      <rect x="154" y="58" width="505" height="174" rx="22" fill="#f8fafc" fill-opacity="0.78" stroke="#64748b" stroke-opacity="0.55" stroke-width="3"/>
      <rect x="178" y="82" width="458" height="126" rx="14" fill="#ffffff" fill-opacity="0.58" stroke="#bfdbfe"/>
      <path d="M178 112H636M178 142H636M178 172H636M230 82V208M282 82V208M334 82V208M386 82V208M438 82V208M490 82V208M542 82V208M594 82V208" stroke="#2563eb" stroke-opacity="0.12"/>
      <rect x="195" y="102" width="88" height="54" rx="10" fill="#3b82f6"/>
      <text x="239" y="135" text-anchor="middle" class="smallw">P1</text>
      <rect x="296" y="102" width="88" height="54" rx="10" fill="#3b82f6"/>
      <text x="340" y="135" text-anchor="middle" class="smallw">P2</text>
      <rect x="398" y="102" width="70" height="80" rx="10" fill="#f59e0b"/>
      <text x="433" y="146" text-anchor="middle" class="smallw">P3</text>
      <rect x="482" y="102" width="88" height="54" rx="10" fill="#06b6d4"/>
      <text x="526" y="135" text-anchor="middle" class="smallw">P4</text>
      <circle cx="80" cy="252" r="34" fill="#0f172a"/>
      <circle cx="80" cy="252" r="13" fill="#94a3b8"/>
      <circle cx="350" cy="252" r="34" fill="#0f172a"/>
      <circle cx="350" cy="252" r="13" fill="#94a3b8"/>
      <circle cx="590" cy="252" r="34" fill="#0f172a"/>
      <circle cx="590" cy="252" r="13" fill="#94a3b8"/>
    </g>

    <!-- meters -->
    <rect x="642" y="470" width="246" height="72" rx="18" fill="#fff" fill-opacity="0.76" stroke="#e2e8f0"/>
    <text x="662" y="496" class="s">Объём</text><text x="846" y="496" text-anchor="end" class="t">62%</text>
    <rect x="662" y="512" width="206" height="10" rx="5" fill="#e2e8f0"/><rect x="662" y="512" width="128" height="10" rx="5" fill="url(#green)"/>
    <rect x="908" y="470" width="246" height="72" rx="18" fill="#fff" fill-opacity="0.76" stroke="#e2e8f0"/>
    <text x="928" y="496" class="s">Вес</text><text x="1112" y="496" text-anchor="end" class="t">48%</text>
    <rect x="928" y="512" width="206" height="10" rx="5" fill="#e2e8f0"/><rect x="928" y="512" width="99" height="10" rx="5" fill="url(#blue)"/>
    <rect x="1174" y="470" width="246" height="72" rx="18" fill="#fff" fill-opacity="0.76" stroke="#e2e8f0"/>
    <text x="1194" y="496" class="s">Паллеты</text><text x="1378" y="496" text-anchor="end" class="t">4/6</text>
    <rect x="1194" y="512" width="206" height="10" rx="5" fill="#e2e8f0"/><rect x="1194" y="512" width="137" height="10" rx="5" fill="#8b5cf6"/>

    <!-- pallet preview + plan -->
    <rect x="642" y="560" width="250" height="160" rx="22" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="662" y="588" class="s">3D поддон</text>
    <g transform="translate(690 610) rotate(-16)">
      <rect x="0" y="54" width="150" height="54" rx="8" fill="#8B7355"/>
      <path d="M12 60V102M42 60V102M72 60V102M102 60V102M132 60V102" stroke="#6f5a40" stroke-width="8"/>
      <rect x="16" y="10" width="32" height="28" rx="6" fill="#b89466"/>
      <rect x="54" y="10" width="32" height="28" rx="6" fill="#b89466"/>
      <rect x="92" y="10" width="32" height="28" rx="6" fill="#f59e0b"/>
      <rect x="16" y="40" width="32" height="28" rx="6" fill="#b89466"/>
      <rect x="54" y="40" width="32" height="28" rx="6" fill="#b89466"/>
      <rect x="92" y="40" width="32" height="28" rx="6" fill="#f59e0b"/>
      <rect x="8" y="4" width="128" height="76" rx="12" fill="#ffffff" opacity="0.24" stroke="#fff"/>
    </g>
    <rect x="912" y="560" width="508" height="160" rx="22" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="932" y="588" class="s">План кузова: drag &amp; drop, R — поворот</text>
    <rect x="932" y="604" width="468" height="92" rx="14" fill="url(#grid)" stroke="#bfdbfe"/>
    <rect x="950" y="620" width="84" height="52" rx="9" fill="#8B7355"/><text x="992" y="652" text-anchor="middle" class="smallw">P1</text>
    <rect x="1048" y="620" width="84" height="52" rx="9" fill="#8B7355"/><text x="1090" y="652" text-anchor="middle" class="smallw">P2</text>
    <rect x="1146" y="620" width="52" height="74" rx="9" fill="#8b5cf6"/><text x="1172" y="662" text-anchor="middle" class="smallw">P3</text>
    <rect x="1212" y="620" width="84" height="52" rx="9" fill="#06b6d4"/><text x="1254" y="652" text-anchor="middle" class="smallw">P4</text>

    <!-- bottom results -->
    <rect x="28" y="665" width="1424" height="108" rx="28" fill="#fff" fill-opacity="0.82" stroke="#cbd5e1" stroke-opacity="0.55"/>
    <text x="58" y="704" class="s">💰 Стоимость перевозки</text>
    <text x="58" y="758" class="price">12 850 ₽</text>
    <text x="382" y="704" class="s">⏱ Время доставки</text>
    <text x="382" y="742" class="t">3–5 дней</text>
    <text x="382" y="764" class="s">Расстояние: 286 км</text>
    <text x="612" y="704" class="s">📊 Детализация</text>
    <text x="612" y="731" class="muted">Базовый тариф 8 500 ₽ · Топливо 2 100 ₽</text>
    <text x="612" y="756" class="muted">Страховка 850 ₽ · Грузчики 1 400 ₽</text>
    <rect x="1045" y="698" width="250" height="52" rx="18" fill="url(#blue)"/>
    <text x="1170" y="731" text-anchor="middle" class="w">Рассчитать точно</text>
    <rect x="1310" y="698" width="110" height="52" rx="18" fill="#e5e7eb"/>
    <text x="1365" y="731" text-anchor="middle" class="muted">PDF</text>
  </g>

  <text x="800" y="970" text-anchor="middle" font-family="Arial" font-size="16" font-weight="700" fill="#64748b">Так выглядит блок: glassmorphism-панели, 3D-грузовик справа, поддоны, план кузова и нижний расчёт стоимости.</text>
</svg>
