<svg width="1800" height="1100" viewBox="0 0 1800 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.64"/>
    </linearGradient>
    <linearGradient id="floor" x1="500" y1="830" x2="1450" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#cbd5e1"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#0f172a" flood-opacity="0.17"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <pattern id="smallgrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#2563eb" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
    <style>
      .title{font:900 46px Arial,sans-serif;fill:#0f172a;letter-spacing:-2px}
      .subtitle{font:600 20px Arial,sans-serif;fill:#475569}
      .h{font:900 24px Arial,sans-serif;fill:#111827}
      .h2{font:900 18px Arial,sans-serif;fill:#111827}
      .txt{font:700 15px Arial,sans-serif;fill:#475569}
      .muted{font:700 13px Arial,sans-serif;fill:#64748b}
      .white{font:900 15px Arial,sans-serif;fill:white}
      .smallwhite{font:800 12px Arial,sans-serif;fill:white}
      .tag{font:900 12px Arial,sans-serif;fill:#1d4ed8}
      .price{font:900 42px Arial,sans-serif;fill:#111827;letter-spacing:-1.2px}
    </style>
  </defs>

  <rect width="1800" height="1100" fill="url(#bg)"/>
  <circle cx="230" cy="130" r="260" fill="#2563eb" opacity="0.13" filter="url(#soft)"/>
  <circle cx="1570" cy="190" r="310" fill="#10b981" opacity="0.10" filter="url(#soft)"/>
  <rect width="1800" height="1100" fill="url(#smallgrid)" opacity="0.45"/>

  <text x="900" y="70" text-anchor="middle" class="title">Как я понял правильный 3D калькулятор</text>
  <text x="900" y="108" text-anchor="middle" class="subtitle">Не «картинка грузовика», а рабочий 3D-конструктор загрузки: человек сам ставит коробки, мебель и технику в кузов</text>

  <g filter="url(#shadow)">
    <rect x="45" y="145" width="1710" height="895" rx="38" fill="url(#glass)" stroke="white" stroke-opacity="0.85"/>
  </g>

  <!-- LEFT PANEL -->
  <g>
    <rect x="75" y="175" width="600" height="835" rx="30" fill="white" fill-opacity="0.86" stroke="#dbe3ef"/>
    <text x="110" y="220" class="h">Панель управления 40%</text>
    <text x="110" y="248" class="muted">Пользователь сначала выбирает сценарий, машину и предметы</text>

    <!-- move type -->
    <text x="110" y="295" class="h2">1. Тип перевозки</text>
    <rect x="110" y="315" width="165" height="78" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="130" y="344" class="h2">🏠 Квартирный</text>
    <text x="130" y="370" class="muted">мебель, техника, вещи</text>
    <rect x="290" y="315" width="165" height="78" rx="18" fill="#fff" stroke="#cbd5e1"/>
    <text x="310" y="344" class="h2">🏢 Офисный</text>
    <text x="310" y="370" class="muted">столы, IT, архив</text>
    <rect x="470" y="315" width="165" height="78" rx="18" fill="#fff" stroke="#cbd5e1"/>
    <text x="490" y="344" class="h2">📦 Коммерч.</text>
    <text x="490" y="370" class="muted">паллеты, товар</text>

    <!-- vehicle -->
    <text x="110" y="438" class="h2">2. Выбор кузова</text>
    <rect x="110" y="458" width="123" height="72" rx="18" fill="url(#blue)"/>
    <text x="171" y="486" text-anchor="middle" class="white">Газель 3 м</text>
    <text x="171" y="510" text-anchor="middle" class="smallwhite">3×1.9×1.8</text>
    <rect x="248" y="458" width="123" height="72" rx="18" fill="#fff" stroke="#cbd5e1"/>
    <text x="309" y="486" text-anchor="middle" class="txt">Газель 4.2 м</text>
    <text x="309" y="510" text-anchor="middle" class="muted">4.2×2×2.1</text>
    <rect x="386" y="458" width="123" height="72" rx="18" fill="#fff" stroke="#cbd5e1"/>
    <text x="447" y="486" text-anchor="middle" class="txt">Фургон 5 м</text>
    <text x="447" y="510" text-anchor="middle" class="muted">5×2.1×2.1</text>
    <rect x="524" y="458" width="111" height="72" rx="18" fill="#fff" stroke="#cbd5e1"/>
    <text x="579" y="486" text-anchor="middle" class="txt">6 м</text>
    <text x="579" y="510" text-anchor="middle" class="muted">крупный</text>

    <!-- object library -->
    <text x="110" y="575" class="h2">3. Библиотека предметов</text>
    <text x="110" y="600" class="muted">Не только коробки — мебель, техника, особые грузы</text>

    <rect x="110" y="620" width="250" height="80" rx="18" fill="#f8fafc" stroke="#dbe3ef"/>
    <text x="132" y="650" class="h2">🛋 Диван</text><text x="132" y="676" class="muted">210×90×85 · 85 кг</text>
    <rect x="375" y="620" width="260" height="80" rx="18" fill="#f8fafc" stroke="#dbe3ef"/>
    <text x="397" y="650" class="h2">🧊 Холодильник</text><text x="397" y="676" class="muted">70×70×190 · 80 кг</text>
    <rect x="110" y="714" width="250" height="80" rx="18" fill="#f8fafc" stroke="#dbe3ef"/>
    <text x="132" y="744" class="h2">🚪 Шкаф</text><text x="132" y="770" class="muted">120×60×210 · 90 кг</text>
    <rect x="375" y="714" width="260" height="80" rx="18" fill="#f8fafc" stroke="#dbe3ef"/>
    <text x="397" y="744" class="h2">📦 Коробка M</text><text x="397" y="770" class="muted">60×40×40 · 14 кг</text>
    <rect x="110" y="808" width="250" height="80" rx="18" fill="#f8fafc" stroke="#dbe3ef"/>
    <text x="132" y="838" class="h2">🛏 Кровать</text><text x="132" y="864" class="muted">205×95×45 · 70 кг</text>
    <rect x="375" y="808" width="260" height="80" rx="18" fill="#f8fafc" stroke="#dbe3ef"/>
    <text x="397" y="838" class="h2">🎹 Пианино</text><text x="397" y="864" class="muted">особый груз · тяжёлый</text>

    <!-- selected object controls -->
    <rect x="110" y="920" width="525" height="64" rx="18" fill="#0f172a"/>
    <text x="132" y="948" class="white">Выбран: холодильник</text>
    <text x="132" y="971" class="smallwhite">X/Y/Z позиция · поворот · поднять/опустить · удалить</text>
  </g>

  <!-- RIGHT 3D PANEL -->
  <g>
    <rect x="705" y="175" width="1018" height="835" rx="30" fill="#eef6ff" fill-opacity="0.62" stroke="#dbeafe"/>
    <text x="740" y="220" class="h">Правая зона 60% — настоящая 3D-сцена</text>
    <text x="740" y="248" class="muted">Режимы: внутри кузова / вид сверху / сбоку / рентген / автозагрузка</text>

    <!-- top buttons -->
    <rect x="740" y="275" width="135" height="40" rx="20" fill="url(#blue)"/>
    <text x="807" y="301" text-anchor="middle" class="white">Внутри кузова</text>
    <rect x="888" y="275" width="95" height="40" rx="20" fill="#fff" stroke="#cbd5e1"/>
    <text x="935" y="301" text-anchor="middle" class="txt">Сверху</text>
    <rect x="996" y="275" width="80" height="40" rx="20" fill="#fff" stroke="#cbd5e1"/>
    <text x="1036" y="301" text-anchor="middle" class="txt">Сбоку</text>
    <rect x="1089" y="275" width="90" height="40" rx="20" fill="#fff" stroke="#cbd5e1"/>
    <text x="1134" y="301" text-anchor="middle" class="txt">Рентген</text>
    <rect x="1192" y="275" width="140" height="40" rx="20" fill="#ecfdf5" stroke="#10b981"/>
    <text x="1262" y="301" text-anchor="middle" font-family="Arial" font-weight="900" font-size="14" fill="#047857">Автозагрузка</text>

    <!-- 3D cargo bay frame -->
    <rect x="740" y="340" width="940" height="510" rx="28" fill="#dbeafe" stroke="#bfdbfe"/>
    <path d="M855 790 L1500 790 L1605 505 L980 505 Z" fill="url(#floor)" stroke="#64748b" stroke-width="3"/>
    <path d="M980 505 L1605 505 L1605 405 L980 405 Z" fill="#ffffff" fill-opacity="0.30" stroke="#2563eb" stroke-opacity="0.65" stroke-width="3"/>
    <path d="M855 790 L980 505 L980 405 L855 685 Z" fill="#ffffff" fill-opacity="0.25" stroke="#2563eb" stroke-opacity="0.65" stroke-width="3"/>
    <path d="M1500 790 L1605 505 L1605 405 L1500 685 Z" fill="#ffffff" fill-opacity="0.18" stroke="#2563eb" stroke-opacity="0.65" stroke-width="3"/>

    <!-- perspective grid floor -->
    <g stroke="#2563eb" stroke-opacity="0.18" stroke-width="2">
      <path d="M910 790 L1028 505"/><path d="M970 790 L1085 505"/><path d="M1030 790 L1142 505"/><path d="M1090 790 L1199 505"/><path d="M1150 790 L1256 505"/><path d="M1210 790 L1313 505"/><path d="M1270 790 L1370 505"/><path d="M1330 790 L1427 505"/><path d="M1390 790 L1484 505"/>
      <path d="M875 742 L1518 742"/><path d="M895 695 L1535 695"/><path d="M918 648 L1553 648"/><path d="M940 600 L1570 600"/><path d="M962 552 L1588 552"/>
    </g>

    <!-- objects in 3d -->
    <!-- sofa -->
    <g transform="translate(970 690)">
      <path d="M0 40 L180 40 L210 -22 L35 -22 Z" fill="#475569" stroke="#1e293b" stroke-width="3"/>
      <path d="M35 -22 L210 -22 L210 -70 L35 -70 Z" fill="#64748b" stroke="#1e293b" stroke-width="3"/>
      <path d="M0 40 L35 -22 L35 -70 L0 -8 Z" fill="#334155" stroke="#1e293b" stroke-width="3"/>
      <text x="104" y="-2" text-anchor="middle" class="smallwhite">ДИВАН</text>
    </g>

    <!-- fridge selected -->
    <g transform="translate(1230 595)">
      <path d="M0 120 L70 120 L95 0 L25 0 Z" fill="#e2e8f0" stroke="#0f172a" stroke-width="3"/>
      <path d="M25 0 L95 0 L95 -150 L25 -150 Z" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/>
      <path d="M0 120 L25 0 L25 -150 L0 -25 Z" fill="#cbd5e1" stroke="#0f172a" stroke-width="3"/>
      <path d="M34 -70 L88 -70" stroke="#94a3b8" stroke-width="4"/>
      <text x="52" y="-15" text-anchor="middle" font-family="Arial" font-weight="900" font-size="13" fill="#0f172a">ХОЛОД.</text>
      <!-- selection bbox -->
      <path d="M-12 132 L82 132 L110 -160 L15 -160 Z" fill="none" stroke="#2563eb" stroke-width="5" stroke-dasharray="10 8"/>
      <!-- gizmo arrows -->
      <line x1="45" y1="-170" x2="45" y2="-245" stroke="#10b981" stroke-width="8" stroke-linecap="round"/>
      <path d="M45 -260 L25 -228 L65 -228 Z" fill="#10b981"/>
      <line x1="105" y1="55" x2="190" y2="10" stroke="#ef4444" stroke-width="8" stroke-linecap="round"/>
      <path d="M205 2 L168 3 L188 34 Z" fill="#ef4444"/>
      <line x1="12" y1="117" x2="-65" y2="155" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
      <path d="M-82 164 L-45 163 L-65 132 Z" fill="#2563eb"/>
      <circle cx="45" cy="-68" r="74" fill="none" stroke="#f59e0b" stroke-width="5" stroke-dasharray="9 7"/>
    </g>

    <!-- stacked boxes -->
    <g transform="translate(1405 675)">
      <path d="M0 55 L80 55 L103 0 L25 0 Z" fill="#3b82f6" stroke="#1d4ed8" stroke-width="3"/>
      <path d="M25 0 L103 0 L103 -58 L25 -58 Z" fill="#60a5fa" stroke="#1d4ed8" stroke-width="3"/>
      <path d="M0 55 L25 0 L25 -58 L0 -3 Z" fill="#2563eb" stroke="#1d4ed8" stroke-width="3"/>
      <path d="M15 -15 L95 -15 L116 -68 L38 -68 Z" fill="#3b82f6" stroke="#1d4ed8" stroke-width="3"/>
      <path d="M38 -68 L116 -68 L116 -126 L38 -126 Z" fill="#60a5fa" stroke="#1d4ed8" stroke-width="3"/>
      <path d="M15 -15 L38 -68 L38 -126 L15 -73 Z" fill="#2563eb" stroke="#1d4ed8" stroke-width="3"/>
      <text x="62" y="-28" text-anchor="middle" class="smallwhite">КОРОБКИ</text>
    </g>

    <!-- wardrobe vertical -->
    <g transform="translate(1080 570)">
      <path d="M0 135 L95 135 L115 0 L22 0 Z" fill="#8b5cf6" stroke="#4c1d95" stroke-width="3"/>
      <path d="M22 0 L115 0 L115 -170 L22 -170 Z" fill="#a78bfa" stroke="#4c1d95" stroke-width="3"/>
      <path d="M0 135 L22 0 L22 -170 L0 -35 Z" fill="#7c3aed" stroke="#4c1d95" stroke-width="3"/>
      <line x1="68" y1="-160" x2="68" y2="-5" stroke="#4c1d95" stroke-width="3"/>
      <text x="67" y="-65" text-anchor="middle" class="smallwhite">ШКАФ</text>
    </g>

    <!-- pallet with boxes -->
    <g transform="translate(1320 780)">
      <path d="M0 35 L170 35 L195 -12 L28 -12 Z" fill="#8B7355" stroke="#5b4631" stroke-width="3"/>
      <path d="M25 -12 L62 -12 L62 -42 L25 -42 Z" fill="#f59e0b" stroke="#92400e" stroke-width="2"/>
      <path d="M68 -12 L105 -12 L105 -42 L68 -42 Z" fill="#f59e0b" stroke="#92400e" stroke-width="2"/>
      <path d="M111 -12 L148 -12 L148 -42 L111 -42 Z" fill="#f59e0b" stroke="#92400e" stroke-width="2"/>
      <text x="98" y="22" text-anchor="middle" class="smallwhite">ПАЛЛЕТА</text>
    </g>

    <!-- interior mode labels -->
    <rect x="760" y="360" width="245" height="76" rx="20" fill="#0f172a" fill-opacity="0.86"/>
    <text x="782" y="390" class="white">Вид «внутри кузова»</text>
    <text x="782" y="416" class="smallwhite">можно ходить камерой и смотреть,</text>
    <text x="782" y="434" class="smallwhite">как груз стоит реально</text>

    <!-- mini top plan -->
    <rect x="1450" y="360" width="205" height="128" rx="20" fill="white" fill-opacity="0.88" stroke="#cbd5e1"/>
    <text x="1470" y="386" class="h2">Мини-план</text>
    <rect x="1470" y="400" width="165" height="68" rx="8" fill="url(#smallgrid)" stroke="#93c5fd"/>
    <rect x="1482" y="412" width="45" height="24" rx="4" fill="#64748b"/>
    <rect x="1534" y="412" width="25" height="45" rx="4" fill="#e2e8f0" stroke="#2563eb" stroke-width="3"/>
    <rect x="1568" y="412" width="38" height="24" rx="4" fill="#60a5fa"/>
    <rect x="1482" y="442" width="70" height="18" rx="4" fill="#8B7355"/>

    <!-- bottom control panel -->
    <rect x="740" y="875" width="940" height="105" rx="24" fill="white" fill-opacity="0.88" stroke="#dbe3ef"/>
    <text x="765" y="910" class="h2">Инструменты выбранного предмета</text>
    <rect x="765" y="930" width="115" height="34" rx="17" fill="#eff6ff" stroke="#2563eb"/>
    <text x="822" y="952" text-anchor="middle" class="tag">Переместить</text>
    <rect x="892" y="930" width="105" height="34" rx="17" fill="#fff7ed" stroke="#f59e0b"/>
    <text x="944" y="952" text-anchor="middle" font-family="Arial" font-weight="900" font-size="12" fill="#b45309">Крутить</text>
    <rect x="1009" y="930" width="120" height="34" rx="17" fill="#ecfdf5" stroke="#10b981"/>
    <text x="1069" y="952" text-anchor="middle" font-family="Arial" font-weight="900" font-size="12" fill="#047857">Поднять Z</text>
    <rect x="1141" y="930" width="120" height="34" rx="17" fill="#fef2f2" stroke="#ef4444"/>
    <text x="1201" y="952" text-anchor="middle" font-family="Arial" font-weight="900" font-size="12" fill="#b91c1c">Опустить</text>
    <rect x="1273" y="930" width="120" height="34" rx="17" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="1333" y="952" text-anchor="middle" class="muted">Snap 10 см</text>
    <rect x="1405" y="930" width="120" height="34" rx="17" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="1465" y="952" text-anchor="middle" class="muted">Коллизии</text>
    <rect x="1537" y="930" width="120" height="34" rx="17" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="1597" y="952" text-anchor="middle" class="muted">Удалить</text>
  </g>

  <!-- BOTTOM CALC -->
  <g filter="url(#shadow)">
    <rect x="75" y="1030" width="1650" height="0" rx="0" fill="white"/>
  </g>

  <!-- side explanation callouts -->
  <g>
    <rect x="700" y="145" width="310" height="58" rx="18" fill="#111827"/>
    <text x="720" y="170" class="smallwhite">Главное отличие от текущего:</text>
    <text x="720" y="190" class="smallwhite">3D должен быть большим и занимать сцену, а не точкой</text>

    <rect x="1028" y="145" width="342" height="58" rx="18" fill="#111827"/>
    <text x="1048" y="170" class="smallwhite">Квартирный переезд:</text>
    <text x="1048" y="190" class="smallwhite">диван, шкаф, холодильник, кровать, техника + коробки</text>

    <rect x="1388" y="145" width="335" height="58" rx="18" fill="#111827"/>
    <text x="1408" y="170" class="smallwhite">Свобода грузчика:</text>
    <text x="1408" y="190" class="smallwhite">двигать, вращать, поднимать, ставить друг на друга</text>
  </g>
</svg>